<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>けいさんくん プリント</title>

<style>
@page { size:A4; margin:1cm; }

body {
    font-family: monospace;
    margin:0;
}

.print-btn {
    margin:20px;
    padding:10px 20px;
    font-size:16px;
}

.page {
    height: calc(297mm - 2cm);
    display:flex;
    flex-direction:column;
    page-break-after:always;
}

.header {
    margin-bottom:20px;
}

.title {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.name-line {
    display:flex;
    justify-content:space-between;
    font-size:18px;
    margin-bottom:10px;
}

.columns {
    display:grid;
    grid-template-columns:1fr 1fr;
    flex:1;
}

.column {
    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
    padding:0 40px;
}

.problem {
    font-size:24px;
}

.vertical-block {
    display:inline-block;
    text-align:right;
    width:8ch;   /* ← 幅を広げた */
}

.vertical-line {
    border-top:2px solid black;
    margin-top:4px;
}

@media print { .print-btn { display:none; } }

</style>
</head>
<body>

<button class="print-btn" onclick="window.print()">印刷する</button>
<div id="printArea"></div>

<script>

const params = new URLSearchParams(window.location.search);

const operation = params.get("operation");
const option = params.get("option");
const digit1 = parseInt(params.get("digit1"));
const digit2 = parseInt(params.get("digit2"));
const qpp = parseInt(params.get("qpp"));
const pages = parseInt(params.get("pages"));
const format = params.get("format") || "horizontal";

const printArea = document.getElementById("printArea");

/* ===== 生成 ===== */

function randomNumber(d){
    const min=Math.pow(10,d-1);
    const max=Math.pow(10,d)-1;
    return Math.floor(Math.random()*(max-min+1))+min;
}

function generateProblem(){
    let a,b;
    while(true){
        a=randomNumber(digit1);
        b=randomNumber(digit2);

        if(operation==="div"){
            if(b===0) continue;
            const r=a%b;
            if(option==="remainder_yes"&&r!==0) break;
            if(option==="remainder_no"&&r===0) break;
        } else break;
    }
    return {a,b};
}

function getSymbol(op){
    if(op==="add") return "+";
    if(op==="sub") return "-";
    if(op==="mul") return "×";
    if(op==="div") return "÷";
}

/* ===== 筆算 ===== */

function createVertical(number,a,b,symbol){

    const block=document.createElement("div");
    block.className="vertical-block";

    const width=8;

    const top=String(a).padStart(width," ");
    const bottom=String(b).padStart(width," ");

    const bottomLine =
        symbol + bottom.substring(1);  // 記号を固定左端へ

    block.innerHTML =
        number + ".<br>" +
        top + "<br>" +
        bottomLine +
        "<div class='vertical-line'></div>";

    return block;
}

/* ===== レイアウト ===== */

function getTitle(){
    const opText =
        operation==="add"?"たしざん":
        operation==="sub"?"ひきざん":
        operation==="mul"?"かけざん":
        "わりざん";

    return digit1+"けた と "+digit2+"けた の "+opText;
}

for(let p=0;p<pages;p++){

    const page=document.createElement("div");
    page.className="page";

    const header=document.createElement("div");
    header.className="header";
    header.innerHTML =
        "<div class='title'>"+getTitle()+"</div>" +
        "<div class='name-line'>" +
        "<div>なまえ：＿＿＿＿＿＿＿＿</div>" +
        "<div>ひづけ：＿＿＿＿＿＿＿＿</div>" +
        "</div>";

    const columns=document.createElement("div");
    columns.className="columns";

    const col1=document.createElement("div");
    col1.className="column";
    const col2=document.createElement("div");
    col2.className="column";

    for(let i=0;i<qpp;i++){

        const data=generateProblem();
        const wrapper=document.createElement("div");
        wrapper.className="problem";

        const number=i+1;

        if(format==="vertical"){
            wrapper.appendChild(
                createVertical(number,data.a,data.b,getSymbol(operation))
            );
        } else {
            wrapper.textContent =
                number + ". " +
                data.a + " " +
                getSymbol(operation) + " " +
                data.b + " =";
        }

        if(i<qpp/2) col1.appendChild(wrapper);
        else col2.appendChild(wrapper);
    }

    columns.appendChild(col1);
    columns.appendChild(col2);

    page.appendChild(header);
    page.appendChild(columns);
    printArea.appendChild(page);
}

</script>
</body>
</html>
