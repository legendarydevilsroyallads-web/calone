<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算プリント</title>

<style>
@page { size:A4; margin:10mm; }

body {
    margin:0;
    font-family:"Courier New", monospace;
    font-size:10pt;
}

.print-area { padding:10px; }

.print-btn {
    padding:6px 14px;
    font-size:10pt;
    cursor:pointer;
}

@media print {
    .print-area { display:none; }
}

.page {
    width:190mm;
    height:277mm;
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:20mm;
}

.column {
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.problem {
    display:grid;
    grid-template-columns:18mm auto;
    align-items:start;
}

/* ===== 足し算・引き算・かけ算 ===== */

.vertical {
    display:grid;
    grid-template-columns:1ch repeat(6,1ch);
    line-height:1.2;
}

.line {
    grid-column:1 / span 7;
    border-top:1px solid black;
    margin-top:2px;
}

/* ===== 割り算 ===== */

.division-wrapper {
    display:flex;
    flex-direction:column;
}

.answer-line {
    border-top:1px solid black;
    height:0;
    margin-left:20mm;
    margin-bottom:2mm;
}

.division-row {
    display:flex;
}

.divisor {
    min-width:20mm;
    text-align:right;
    margin-right:2mm;
}
</style>
</head>
<body>

<div class="print-area">
<button class="print-btn" onclick="window.print()">印刷する</button>
</div>

<div class="page">
<div class="column" id="col1"></div>
<div class="column" id="col2"></div>
</div>

<script>

/* ===== パラメータ取得 ===== */

const params = new URLSearchParams(window.location.search);
const operation = params.get("operation") || "add";
const option = params.get("option") || "carry_yes";
const digit1 = parseInt(params.get("digit1")) || 3;
const digit2 = parseInt(params.get("digit2")) || 3;

const TOTAL = 20;
const PER_COL = 10;

/* ===== タイトル自動変更 ===== */

function getTitle(op){
    if(op==="add") return "足し算プリント";
    if(op==="sub") return "引き算プリント";
    if(op==="mul") return "かけ算プリント";
    if(op==="div") return "割り算プリント";
    return "計算プリント";
}
document.title = getTitle(operation);

/* ===== 共通関数 ===== */

function randomNumber(d){
    const min = Math.pow(10,d-1);
    const max = Math.pow(10,d)-1;
    return Math.floor(Math.random()*(max-min+1))+min;
}

function pad(num){
    return String(num).padStart(6," ");
}

function getSymbol(){
    if(operation==="add") return "+";
    if(operation==="sub") return "-";
    if(operation==="mul") return "×";
}

/* ===== 足し算 ===== */

function generateAdd(){

    let a="", b="";
    let carryMade=false;

    for(let i=0;i<digit1;i++){

        let da=Math.floor(Math.random()*10);
        let db;

        if(option==="carry_no"){
            db=Math.floor(Math.random()*(10-da));
        }
        else{
            if(!carryMade && i===0){
                da=Math.floor(Math.random()*9)+1;
                db=10-da+Math.floor(Math.random()*(10-(10-da)));
                carryMade=true;
            } else {
                db=Math.floor(Math.random()*10);
            }
        }

        a+=da;
        b+=db;
    }

    return {a:parseInt(a), b:parseInt(b)};
}

/* ===== 引き算 ===== */

function generateSub(){

    let a="", b="";
    let borrowMade=false;

    for(let i=0;i<digit1;i++){

        let da=Math.floor(Math.random()*10);
        let db;

        if(option==="borrow_no"){
            db=Math.floor(Math.random()*(da+1));
        }
        else{
            if(!borrowMade && i===0){
                da=Math.floor(Math.random()*9);
                db=da+1+Math.floor(Math.random()*(9-da));
                borrowMade=true;
            } else {
                db=Math.floor(Math.random()*10);
            }
        }

        a+=da;
        b+=db;
    }

    if(parseInt(a)<parseInt(b)) return generateSub();
    return {a:parseInt(a), b:parseInt(b)};
}

/* ===== かけ算 ===== */

function generateMul(){
    return {
        a: randomNumber(digit1),
        b: randomNumber(digit2)
    };
}

/* ===== 割り算 ===== */

function generateDiv(){

    const divisor = randomNumber(digit2);
    const quotient = randomNumber(1);

    let dividend = divisor * quotient;

    if(option==="remainder_yes"){
        const remainder = Math.floor(Math.random()*(divisor-1))+1;
        dividend += remainder;
    }

    return {a:dividend, b:divisor};
}

/* ===== 問題作成 ===== */

function createVertical(n,a,b){

    const wrapper=document.createElement("div");
    wrapper.className="problem";

    const number=document.createElement("div");
    number.textContent="("+n+")";

    const grid=document.createElement("div");
    grid.className="vertical";

    for(let i=0;i<7;i++)
        grid.appendChild(document.createElement("div"));

    grid.appendChild(document.createElement("div"));
    pad(a).split("").forEach(ch=>{
        const d=document.createElement("div");
        d.textContent=ch===" "?"":ch;
        grid.appendChild(d);
    });

    const sym=document.createElement("div");
    sym.textContent=getSymbol();
    grid.appendChild(sym);

    pad(b).split("").forEach(ch=>{
        const d=document.createElement("div");
        d.textContent=ch===" "?"":ch;
        grid.appendChild(d);
    });

    const line=document.createElement("div");
    line.className="line";
    grid.appendChild(line);

    wrapper.appendChild(number);
    wrapper.appendChild(grid);
    return wrapper;
}

function createDivision(n, dividend, divisor){

    const wrapper=document.createElement("div");
    wrapper.className="problem";

    const number=document.createElement("div");
    number.textContent="("+n+")";

    const box=document.createElement("div");
    box.className="division-wrapper";

    const line=document.createElement("div");
    line.className="answer-line";
    line.style.width=(String(dividend).length*6)+"mm";

    const row=document.createElement("div");
    row.className="division-row";

    const divisorDiv=document.createElement("div");
    divisorDiv.className="divisor";
    divisorDiv.textContent=divisor;

    const bracket=document.createElement("div");
    bracket.textContent="）";

    const dividendDiv=document.createElement("div");
    dividendDiv.textContent=dividend;

    row.appendChild(divisorDiv);
    row.appendChild(bracket);
    row.appendChild(dividendDiv);

    box.appendChild(line);
    box.appendChild(row);

    wrapper.appendChild(number);
    wrapper.appendChild(box);

    return wrapper;
}

/* ===== 配置 ===== */

for(let i=1;i<=TOTAL;i++){

    let pair;

    if(operation==="add") pair=generateAdd();
    if(operation==="sub") pair=generateSub();
    if(operation==="mul") pair=generateMul();
    if(operation==="div") pair=generateDiv();

    const problem =
        operation==="div"
        ? createDivision(i,pair.a,pair.b)
        : createVertical(i,pair.a,pair.b);

    if(i<=PER_COL)
        col1.appendChild(problem);
    else
        col2.appendChild(problem);
}

</script>
</body>
</html>
