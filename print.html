<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>割り算プリント</title>

<style>
@page { size:A4; margin:10mm; }

body {
    margin:0;
    font-family:"Courier New", monospace;
    font-size:10pt;
}

.print-area { padding:10px; }

.print-btn {
    padding:6px 14px;
    font-size:10pt;
    cursor:pointer;
}

@media print {
    .print-area { display:none; }
}

.page {
    width:190mm;
    height:277mm;
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:20mm;
}

.column {
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.problem {
    display:grid;
    grid-template-columns:18mm auto;
    align-items:start;
}

/* ===== 割り算専用構造 ===== */

.division-wrapper {
    display:flex;
    flex-direction:column;
    align-items:flex-start;
}

.answer-line {
    border-top:1px solid black;
    height:0;
    margin-left:20mm;   /* 割る数分ずらす */
    margin-bottom:2mm;
}

.division-row {
    display:flex;
    align-items:flex-start;
}

.divisor {
    min-width:20mm;
    text-align:right;
    margin-right:2mm;
}

.bracket {
    margin-right:2mm;
}

.dividend {
    min-width:30mm;
    text-align:left;
}

</style>
</head>
<body>

<div class="print-area">
<button class="print-btn" onclick="window.print()">印刷する</button>
</div>

<div class="page">
<div class="column" id="col1"></div>
<div class="column" id="col2"></div>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const digit1 = parseInt(params.get("digit1")) || 3;
const digit2 = parseInt(params.get("digit2")) || 2;
const option = params.get("option") || "remainder_yes";

const TOTAL = 20;
const PER_COL = 10;

/* ===== 数字生成 ===== */

function randomNumber(d){
    const min = Math.pow(10,d-1);
    const max = Math.pow(10,d)-1;
    return Math.floor(Math.random()*(max-min+1))+min;
}

function generateDivision(){

    while(true){

        let dividend = randomNumber(digit1);
        let divisor  = randomNumber(digit2);

        if(divisor===0) continue;

        const r = dividend % divisor;

        if(option==="remainder_yes" && r!==0)
            return {dividend, divisor};

        if(option==="remainder_no" && r===0)
            return {dividend, divisor};
    }
}

/* ===== 問題作成 ===== */

function createProblem(n, dividend, divisor){

    const wrapper = document.createElement("div");
    wrapper.className = "problem";

    const number = document.createElement("div");
    number.textContent = "(" + n + ")";

    const divWrap = document.createElement("div");
    divWrap.className = "division-wrapper";

    const answerLine = document.createElement("div");
    answerLine.className = "answer-line";
    answerLine.style.width = (String(dividend).length * 6) + "mm";

    const row = document.createElement("div");
    row.className = "division-row";

    const divisorDiv = document.createElement("div");
    divisorDiv.className = "divisor";
    divisorDiv.textContent = divisor;

    const bracket = document.createElement("div");
    bracket.className = "bracket";
    bracket.textContent = "）";

    const dividendDiv = document.createElement("div");
    dividendDiv.className = "dividend";
    dividendDiv.textContent = dividend;

    row.appendChild(divisorDiv);
    row.appendChild(bracket);
    row.appendChild(dividendDiv);

    divWrap.appendChild(answerLine);
    divWrap.appendChild(row);

    wrapper.appendChild(number);
    wrapper.appendChild(divWrap);

    return wrapper;
}

/* ===== 配置 ===== */

for(let i=1;i<=TOTAL;i++){

    const pair = generateDivision();
    const p = createProblem(i, pair.dividend, pair.divisor);

    if(i<=PER_COL){
        col1.appendChild(p);
    } else {
        col2.appendChild(p);
    }
}

</script>

</body>
</html>
