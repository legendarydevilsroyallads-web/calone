<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算プリント</title>

<style>
@page { size:A4; margin:10mm; }

body {
    margin:0;
    font-family:"Courier New", monospace;
    font-size:10pt;
}

.print-area {
    padding:10px;
}

.print-btn {
    padding:6px 14px;
    font-size:10pt;
    cursor:pointer;
}

@media print {
    .print-area { display:none; }
}

.page {
    width:190mm;
    height:277mm;
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:20mm;
}

.column {
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.problem {
    display:grid;
    grid-template-columns:18mm auto;
    align-items:start;
}

.vertical {
    display:grid;
    grid-template-columns:1ch repeat(6,1ch);
    line-height:1.2;
}

.line {
    grid-column:1 / span 7;
    border-top:1px solid black;
    margin-top:2px;
}
</style>
</head>
<body>

<div class="print-area">
    <button class="print-btn" onclick="window.print()">印刷する</button>
</div>

<div class="page">
    <div class="column" id="col1"></div>
    <div class="column" id="col2"></div>
</div>

<script>

/* ===== パラメータ取得 ===== */

const params = new URLSearchParams(window.location.search);

const operation = params.get("operation") || "add";
const option = params.get("option") || "carry_yes";
const digit1 = parseInt(params.get("digit1")) || 3;
const digit2 = parseInt(params.get("digit2")) || 3;

const TOTAL = 20;
const PER_COL = 10;

/* ===== 数値生成 ===== */

function randomNumber(d){
    const min = Math.pow(10,d-1);
    const max = Math.pow(10,d)-1;
    return Math.floor(Math.random()*(max-min+1))+min;
}

function hasCarry(a,b){
    while(a>0||b>0){
        if((a%10)+(b%10)>=10) return true;
        a=Math.floor(a/10);
        b=Math.floor(b/10);
    }
    return false;
}

function hasBorrow(a,b){
    while(a>0||b>0){
        if((a%10)<(b%10)) return true;
        a=Math.floor(a/10);
        b=Math.floor(b/10);
    }
    return false;
}

/* ===== 安全生成（無限ループ防止） ===== */

function generatePair(){

    let tries = 0;
    const MAX = 1000;

    while(tries < MAX){

        tries++;

        let a = randomNumber(digit1);
        let b = randomNumber(digit2);

        if(operation==="add"){
            const carry = hasCarry(a,b);
            if(option==="carry_yes" && carry) return {a,b};
            if(option==="carry_no" && !carry) return {a,b};
        }

        else if(operation==="sub"){
            if(a < b) continue;
            const borrow = hasBorrow(a,b);
            if(option==="borrow_yes" && borrow) return {a,b};
            if(option==="borrow_no" && !borrow) return {a,b};
        }

        else if(operation==="mul"){
            return {a,b};
        }

        else if(operation==="div"){
            if(b===0) continue;
            const r = a % b;
            if(option==="remainder_yes" && r!==0) return {a,b};
            if(option==="remainder_no" && r===0) return {a,b};
        }
    }

    // 条件が厳しすぎる場合の保険
    return {
        a: randomNumber(digit1),
        b: randomNumber(digit2)
    };
}

/* ===== 表示 ===== */

function getSymbol(){
    if(operation==="add") return "+";
    if(operation==="sub") return "-";
    if(operation==="mul") return "×";
    if(operation==="div") return "÷";
}

function pad(num){
    return String(num).padStart(6," ");
}

function createProblem(n,a,b){

    const wrapper=document.createElement("div");
    wrapper.className="problem";

    const number=document.createElement("div");
    number.textContent="("+n+")";

    const grid=document.createElement("div");
    grid.className="vertical";

    for(let i=0;i<7;i++){
        grid.appendChild(document.createElement("div"));
    }

    grid.appendChild(document.createElement("div"));
    pad(a).split("").forEach(ch=>{
        const d=document.createElement("div");
        d.textContent=ch===" "?"":ch;
        grid.appendChild(d);
    });

    const sym=document.createElement("div");
    sym.textContent=getSymbol();
    grid.appendChild(sym);

    pad(b).split("").forEach(ch=>{
        const d=document.createElement("div");
        d.textContent=ch===" "?"":ch;
        grid.appendChild(d);
    });

    const line=document.createElement("div");
    line.className="line";
    grid.appendChild(line);

    wrapper.appendChild(number);
    wrapper.appendChild(grid);

    return wrapper;
}

/* ===== 配置 ===== */

for(let i=1;i<=TOTAL;i++){

    const pair = generatePair();
    const problem = createProblem(i,pair.a,pair.b);

    if(i<=PER_COL){
        document.getElementById("col1").appendChild(problem);
    }else{
        document.getElementById("col2").appendChild(problem);
    }
}

</script>

</body>
</html>
