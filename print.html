<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>けいさんくん プリント</title>

<style>
@page { size:A4; margin:1cm; }

body {
    font-family: monospace;
    margin:0;
}

.print-btn {
    margin:20px;
    padding:10px 20px;
}

.page {
    height: calc(297mm - 2cm);
    display:flex;
    flex-direction:column;
    page-break-after:always;
}

.header {
    margin-bottom:20px;
}

.title {
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.name-line {
    display:flex;
    justify-content:space-between;
    font-size:18px;
    margin-top:10px;
}

.columns {
    display:grid;
    grid-template-columns:1fr 1fr;
    flex:1;
}

.column {
    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
    padding:0 40px;
}

.problem {
    font-size:24px;
}

.vertical {
    display:inline-block;
    text-align:right;
    width:8ch; /* ← ここ重要：固定桁幅 */
}

.line {
    border-top:2px solid black;
    width:8ch;
    margin-top:5px;
}

.division {
    display:inline-block;
    font-size:24px;
}

.answer-line {
    border-top:2px solid black;
    width:8ch;
    margin-left:4ch;
    margin-bottom:3px;
}

@media print { .print-btn { display:none; } }

</style>
</head>
<body>

<button class="print-btn" onclick="window.print()">印刷する</button>
<div id="printArea"></div>

<script>

const params = new URLSearchParams(window.location.search);

const operation = params.get("operation");
const digit1 = parseInt(params.get("digit1"));
const digit2 = parseInt(params.get("digit2"));
const qpp = parseInt(params.get("qpp"));
const pages = parseInt(params.get("pages"));
const format = params.get("format");

const printArea = document.getElementById("printArea");

function randomNumber(d){
    const min = Math.pow(10,d-1);
    const max = Math.pow(10,d)-1;
    return Math.floor(Math.random()*(max-min+1))+min;
}

function generateProblem(){
    return {
        a: randomNumber(digit1),
        b: randomNumber(digit2)
    };
}

function getSymbol(op){
    if(op==="add") return "+";
    if(op==="sub") return "-";
    if(op==="mul") return "×";
    if(op==="div") return "÷";
}

function createVertical(num,a,b,symbol){

    const wrapper=document.createElement("div");

    wrapper.innerHTML =
        "(" + num + ")<br>" +
        "<div class='vertical'>" + a + "</div><br>" +
        "<div class='vertical'>" + symbol + b + "</div>" +
        "<div class='line'></div>";

    return wrapper;
}

function createDivision(num,a,b){

    const wrapper=document.createElement("div");
    wrapper.className="division";

    wrapper.innerHTML =
        "(" + num + ")<br>" +
        "<div class='answer-line'></div>" +
        b + " ) " + a;

    return wrapper;
}

for(let p=0;p<pages;p++){

    const pageDiv=document.createElement("div");
    pageDiv.className="page";

    const header=document.createElement("div");
    header.className="header";

    header.innerHTML =
        "<div class='title'>計算プリント</div>" +
        "<div class='name-line'>" +
        "<div>なまえ：＿＿＿＿＿＿＿＿</div>" +
        "<div>ひづけ：＿＿＿＿＿＿＿＿</div>" +
        "</div>";

    const columnsDiv=document.createElement("div");
    columnsDiv.className="columns";

    const col1=document.createElement("div");
    col1.className="column";

    const col2=document.createElement("div");
    col2.className="column";

    for(let i=0;i<qpp;i++){

        const data=generateProblem();
        const wrapper=document.createElement("div");
        wrapper.className="problem";

        const number=i+1;

        if(format==="vertical"){

            if(operation==="div"){
                wrapper.appendChild(
                    createDivision(number,data.a,data.b)
                );
            }else{
                wrapper.appendChild(
                    createVertical(number,data.a,data.b,getSymbol(operation))
                );
            }

        } else {

            wrapper.textContent =
                "(" + number + ") " +
                data.a + " " +
                getSymbol(operation) + " " +
                data.b + " =";
        }

        if(i<qpp/2){ col1.appendChild(wrapper); }
        else{ col2.appendChild(wrapper); }
    }

    columnsDiv.appendChild(col1);
    columnsDiv.appendChild(col2);

    pageDiv.appendChild(header);
    pageDiv.appendChild(columnsDiv);
    printArea.appendChild(pageDiv);
}

</script>
</body>
</html>
