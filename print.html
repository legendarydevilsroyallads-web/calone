<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>割り算プリント</title>

<style>
@page { size:A4; margin:10mm; }

body {
    margin:0;
    font-family:"Courier New", monospace;
    font-size:10pt;
}

.print-area { padding:10px; }

.print-btn {
    padding:6px 14px;
    font-size:10pt;
    cursor:pointer;
}

@media print { .print-area { display:none; } }

.page {
    width:190mm;
    height:277mm;
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:20mm;
}

.column {
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.problem {
    display:grid;
    grid-template-columns:18mm auto;
}

.division-box {
    display:flex;
    flex-direction:column;
}

.answer-line {
    border-top:1px solid black;
    width:40mm;
    margin-left:10mm;
    margin-bottom:3mm;
}

.div-row {
    display:flex;
    align-items:flex-start;
}

</style>
</head>
<body>

<div class="print-area">
<button class="print-btn" onclick="window.print()">印刷する</button>
</div>

<div class="page">
    <div class="column" id="col1"></div>
    <div class="column" id="col2"></div>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const digit1 = parseInt(params.get("digit1")) || 3;
const digit2 = parseInt(params.get("digit2")) || 3;
const option = params.get("option") || "remainder_yes";

const total = 20;

function randomNumber(d){
    const min = Math.pow(10,d-1);
    const max = Math.pow(10,d)-1;
    return Math.floor(Math.random()*(max-min+1))+min;
}

function generateDivision(){
    while(true){
        let a=randomNumber(digit1);
        let b=randomNumber(digit2);
        if(b===0) continue;
        const r=a%b;
        if(option==="remainder_yes" && r!==0) return {a,b};
        if(option==="remainder_no" && r===0) return {a,b};
    }
}

function createProblem(n,a,b){

    const wrapper=document.createElement("div");
    wrapper.className="problem";

    const num=document.createElement("div");
    num.textContent="("+n+")";

    const box=document.createElement("div");
    box.className="division-box";

    const line=document.createElement("div");
    line.className="answer-line";

    const row=document.createElement("div");
    row.className="div-row";
    row.textContent=b+" ）"+a;

    box.appendChild(line);
    box.appendChild(row);

    wrapper.appendChild(num);
    wrapper.appendChild(box);

    return wrapper;
}

for(let i=1;i<=total;i++){

    const pair=generateDivision();
    const p=createProblem(i,pair.a,pair.b);

    if(i<=10){
        col1.appendChild(p);
    }else{
        col2.appendChild(p);
    }
}

</script>

</body>
</html>
