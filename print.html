<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算プリント</title>

<style>
@page {
    size: A4;
    margin: 10mm;
}

body {
    margin: 0;
    font-family: "Courier New", monospace;
    font-size: 10pt;
}

.page {
    width: 190mm;
    height: 277mm;
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 20mm;
}

.column {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.problem {
    display: grid;
    grid-template-columns: 18mm auto;
    align-items: start;
}

.number {
    font-size: 10pt;
}

.vertical {
    display: grid;
    grid-template-columns: 1ch repeat(6,1ch);
    line-height: 1.2;
}

.line {
    grid-column: 1 / span 7;
    border-top: 1px solid black;
    margin-top: 2px;
}
</style>
</head>
<body>

<div class="page">
    <div class="column" id="col1"></div>
    <div class="column" id="col2"></div>
</div>

<script>

/* ===== URLパラメータ取得 ===== */

const params = new URLSearchParams(window.location.search);

const operation = params.get("operation") || "add";
const digit1 = parseInt(params.get("digit1")) || 3;
const digit2 = parseInt(params.get("digit2")) || 3;

const totalProblems = 20;
const perColumn = 10;

/* ===== 数字生成 ===== */

function randomNumber(d){
    const min = Math.pow(10,d-1);
    const max = Math.pow(10,d)-1;
    return Math.floor(Math.random()*(max-min+1))+min;
}

function getSymbol(op){
    if(op==="add") return "+";
    if(op==="sub") return "-";
    if(op==="mul") return "×";
}

/* 6桁固定表示（右揃え） */
function pad(num){
    return String(num).padStart(6," ");
}

/* ===== 問題生成 ===== */

function createProblem(n,a,b){

    const wrapper = document.createElement("div");
    wrapper.className = "problem";

    const numDiv = document.createElement("div");
    numDiv.className = "number";
    numDiv.textContent = "(" + n + ")";

    const grid = document.createElement("div");
    grid.className = "vertical";

    /* 空行 */
    for(let i=0;i<7;i++){
        grid.appendChild(document.createElement("div"));
    }

    /* 上段 */
    grid.appendChild(document.createElement("div"));
    pad(a).split("").forEach(ch=>{
        const d=document.createElement("div");
        d.textContent = ch===" "?"":ch;
        grid.appendChild(d);
    });

    /* 下段 */
    const sym=document.createElement("div");
    sym.textContent=getSymbol(operation);
    grid.appendChild(sym);

    pad(b).split("").forEach(ch=>{
        const d=document.createElement("div");
        d.textContent = ch===" "?"":ch;
        grid.appendChild(d);
    });

    const line=document.createElement("div");
    line.className="line";
    grid.appendChild(line);

    wrapper.appendChild(numDiv);
    wrapper.appendChild(grid);

    return wrapper;
}

/* ===== 配置 ===== */

for(let i=1;i<=totalProblems;i++){

    const a = randomNumber(digit1);
    const b = randomNumber(digit2);

    const problem = createProblem(i,a,b);

    if(i<=perColumn){
        document.getElementById("col1").appendChild(problem);
    }else{
        document.getElementById("col2").appendChild(problem);
    }
}

</script>

</body>
</html>
