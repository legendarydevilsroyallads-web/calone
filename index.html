<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四則演算プリント作成サイト けいさんくん</title>

<style>

body {
    margin:0;
    padding:0;
    font-family: "Yu Gothic", sans-serif;
    background: linear-gradient(135deg,#111,#1c1c1c,#2a2a2a);
    color:#eee;
}

.container {
    max-width:600px;
    margin:40px auto;
    padding:40px;
    border-radius:20px;
    background: rgba(40,40,40,0.85);
    backdrop-filter: blur(10px);
    box-shadow:
        0 0 30px rgba(0,0,0,0.8),
        0 0 10px rgba(212,175,55,0.3);
}

h1 {
    text-align:center;
    margin-bottom:40px;
    font-size:26px;
    letter-spacing:1px;
    background: linear-gradient(90deg,#d4af37,#f6e27a,#d4af37);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

label {
    display:block;
    margin-top:25px;
    font-weight:bold;
    color:#d4af37;
    font-size:15px;
}

select {
    width:100%;
    padding:12px;
    margin-top:8px;
    font-size:16px;
    background:#1f1f1f;
    color:#fff;
    border:1px solid #444;
    border-radius:10px;
    outline:none;
    transition:all 0.3s ease;
}

select:focus {
    border-color:#d4af37;
    box-shadow:0 0 8px rgba(212,175,55,0.5);
}

.row {
    display:flex;
    gap:15px;
}

.row select {
    flex:1;
}

button {
    margin-top:40px;
    width:100%;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    letter-spacing:1px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background: linear-gradient(90deg,#b8860b,#d4af37,#b8860b);
    color:#111;
    box-shadow:0 0 15px rgba(212,175,55,0.6);
    transition:all 0.3s ease;
}

button:hover {
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(212,175,55,0.9);
}

footer {
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>
四則演算プリント作成サイト<br>
けいさんくん
</h1>

<form id="settingsForm">

<label>1. 計算の種類</label>
<select id="operation">
    <option value="add">足し算</option>
    <option value="sub">引き算</option>
    <option value="mul">かけ算</option>
    <option value="div">わり算</option>
</select>

<label>2. 条件</label>
<select id="option">
    <option value="carry_yes">繰り上がりあり</option>
    <option value="carry_no">繰り上がりなし</option>
</select>

<label>3. 何桁と何桁の式にするか</label>
<div class="row">
    <select id="digit1">
        <option value="1">1桁</option>
        <option value="2">2桁</option>
        <option value="3">3桁</option>
    </select>
    <select id="digit2">
        <option value="1">1桁</option>
        <option value="2">2桁</option>
        <option value="3">3桁</option>
    </select>
</div>

<label>4. A4 1枚あたりの問題数</label>
<select id="questionsPerPage">
    <option value="10">10問</option>
    <option value="20">20問</option>
</select>

<label>5. 作成する枚数</label>
<select id="pageCount">
    <option value="1">1枚</option>
    <option value="5">5枚</option>
    <option value="10">10枚</option>
    <option value="20">20枚</option>
</select>

<label>6. 表示形式</label>
<select id="formatType">
    <option value="horizontal">横の式</option>
    <option value="vertical">筆算</option>
</select>

<button type="submit">プリントを作成する</button>

</form>

<footer>
© keisankun
</footer>

</div>

<script>

const operationSelect = document.getElementById("operation");
const optionSelect = document.getElementById("option");

function updateOption() {
    if (operationSelect.value === "add") {
        optionSelect.innerHTML =
            '<option value="carry_yes">繰り上がりあり</option>' +
            '<option value="carry_no">繰り上がりなし</option>';
    }
    else if (operationSelect.value === "sub") {
        optionSelect.innerHTML =
            '<option value="borrow_yes">繰り下がりあり</option>' +
            '<option value="borrow_no">繰り下がりなし</option>';
    }
    else if (operationSelect.value === "div") {
        optionSelect.innerHTML =
            '<option value="remainder_yes">あまりあり</option>' +
            '<option value="remainder_no">あまりなし</option>';
    }
    else {
        optionSelect.innerHTML =
            '<option value="none">特になし</option>';
    }
}

operationSelect.addEventListener("change", updateOption);

document.getElementById("settingsForm").addEventListener("submit", function(e){
    e.preventDefault();

    const query =
        "?operation=" + operationSelect.value +
        "&option=" + optionSelect.value +
        "&digit1=" + document.getElementById("digit1").value +
        "&digit2=" + document.getElementById("digit2").value +
        "&qpp=" + document.getElementById("questionsPerPage").value +
        "&pages=" + document.getElementById("pageCount").value +
        "&format=" + document.getElementById("formatType").value;

    window.location.href = "print.html" + query;
});

</script>

</body>
</html>
