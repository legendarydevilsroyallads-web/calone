<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>昌太郎オリジナル謙介優佑ひっ算足し算プリント</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family: monospace;
margin:20px;
}

.controls{
margin-bottom:20px;
}

button,select{
font-size:16px;
margin-right:10px;
padding:5px 10px;
}

.page{

width:210mm;
height:297mm;

padding:10mm;
box-sizing:border-box;

display:grid;
grid-template-columns: repeat(3,1fr);
grid-template-rows: repeat(6,1fr);

gap:20mm 15mm;

page-break-after:always;
}

.problem{

position:relative;
width:100%;
height:100%;
}

.number-top{
text-align:right;
font-size:28px;
}

.number-bottom{
text-align:right;
font-size:28px;
}

.plus{
position:absolute;
left:calc(100% - 90px);
top:32px;
font-size:28px;
}

.line{
border-bottom:2px solid black;
width:90px;
margin-left:auto;
margin-top:4px;
}

.problem-number{
position:absolute;
top:-8px;
left:0;
font-size:16px;
}

@media print{

.controls{
display:none;
}

body{
margin:0;
}

}

</style>
</head>

<body>

<div class="controls">

上段桁
<select id="digit1">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

下段桁
<select id="digit2">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

枚数
<select id="count">
<option value="10">10</option>
<option value="20">20</option>
</select>

<button onclick="generate()">生成</button>
<button onclick="window.print()">印刷</button>
<button onclick="downloadPDF()">PDF保存</button>

</div>


<div id="pages"></div>

<script>

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function makeNumber(d){

let min=Math.pow(10,d-1)
let max=Math.pow(10,d)-1

if(d==1){
min=1
max=9
}

return rand(min,max)
}

function hasCarry(a,b){

let sa=a.toString().split("").reverse()
let sb=b.toString().split("").reverse()

let len=Math.max(sa.length,sb.length)

for(let i=0;i<len;i++){

let da=parseInt(sa[i]||0)
let db=parseInt(sb[i]||0)

if(da+db>=10) return true

}

return false
}

function makeCarryProblem(d1,d2){

while(true){

let a=makeNumber(d1)
let b=makeNumber(d2)

if(hasCarry(a,b)){
return [a,b]
}

}

}

function problemHTML(num,a,b){

return `
<div class="problem">

<div class="problem-number">(${num})</div>

<div class="number-top">${a}</div>

<div class="plus">＋</div>

<div class="number-bottom">${b}</div>

<div class="line"></div>

</div>
`

}

function generate(){

let d1=parseInt(document.getElementById("digit1").value)
let d2=parseInt(document.getElementById("digit2").value)
let pages=parseInt(document.getElementById("count").value)

let container=document.getElementById("pages")
container.innerHTML=""

for(let p=0;p<pages;p++){

let page=document.createElement("div")
page.className="page"

for(let i=1;i<=18;i++){

let prob=makeCarryProblem(d1,d2)

page.innerHTML+=problemHTML(i,prob[0],prob[1])

}

container.appendChild(page)

}

}

async function downloadPDF(){

const { jsPDF } = window.jspdf

let pages = document.querySelectorAll(".page")

let pdf = new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a4"
})

for(let i=0;i<pages.length;i++){

let canvas = await html2canvas(pages[i],{
scale:2
})

let img = canvas.toDataURL("image/png")

if(i>0){
pdf.addPage()
}

pdf.addImage(img,"PNG",0,0,210,297)

}

pdf.save("hissan_print.pdf")

}

</script>

</body>
</html>
